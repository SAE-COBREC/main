<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

    <link rel="stylesheet" href="https://unpkg.com/leaflet.fullscreen@1.6.0/Control.FullScreen.css"
  />

    <style>
        #map { height: 600px; width: 100%; border: 1px solid #ccc; }
    </style>
</head>
<body>

    <h1>Ma Carte Interactive</h1>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script src="https://unpkg.com/leaflet.fullscreen@1.6.0/Control.FullScreen.js"></script>


    <script>
        var map = L.map('map', {
            fullscreenControl: true
        }).setView([48.733333, -3.466667], 13);// CO DE SPAWN MAP

        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // FLECH DU MARKERX
        var marker = L.marker([48.75770187, -3.45408821]).addTo(map);
        marker.bindPopup("<b>sUCE</b><br>mOI").openPopup();

        L.marker([48.75770187, -3.45408821],{icon: greenIcon,title: "IUT",zIndexOffset: 1000}).addTo(map).bindPopup("<div class='infobulle'><a href='/fr/74051/iut/'>IUT</a><br></div>").openPopup();
    </script>
</body>
</html>
