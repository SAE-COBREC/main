<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Carte avec plein écran</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <!-- Plugin Leaflet.fullscreen CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.fullscreen@1.6.0/Control.FullScreen.css"
  />

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    #map {
      width: 100%;
      height: 100vh; /* toute la hauteur de la fenêtre */
    }
  </style>
</head>
<body>

  <div id="map"></div>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <!-- Plugin Leaflet.fullscreen JS -->
  <script src="https://unpkg.com/leaflet.fullscreen@1.6.0/Control.FullScreen.js"></script>

  <script>
    // Initialisation de la carte
    var map = L.map('map', {
      center: [48.1173, -1.6778], // centre sur Rennes
      zoom: 13,
      fullscreenControl: true // ajoute le bouton plein écran
    });

    // Fond de carte OpenStreetMap
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // Exemple : un marqueur au centre
    L.marker([48.1173, -1.6778]).addTo(map)
      .bindPopup('Rennes')
      .openPopup();
  </script>

</body>
</html>
